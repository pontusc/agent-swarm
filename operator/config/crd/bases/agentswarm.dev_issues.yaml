---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: issues.agentswarm.dev
spec:
  group: agentswarm.dev
  names:
    kind: Issue
    listKind: IssueList
    plural: issues
    singular: issue
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.number
      name: Number
      type: integer
    - jsonPath: .spec.state
      name: State
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.title
      name: Title
      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Issue is the Schema for the issues API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Issue
            properties:
              body:
                description: Body is the GitHub issue body. May be empty.
                type: string
              labels:
                description: Labels mirrors the GitHub labels on the issue.
                items:
                  type: string
                type: array
              number:
                description: Number is the GitHub issue number within the parent repository.
                format: int32
                minimum: 1
                type: integer
              state:
                description: State is the GitHub issue state.
                enum:
                - Open
                - Closed
                type: string
              title:
                description: Title is the GitHub issue title.
                minLength: 1
                type: string
            required:
            - number
            - state
            - title
            type: object
          status:
            description: status defines the observed state of Issue
            properties:
              agentPodName:
                description: AgentPodName is the name of the agent pod assigned to
                  this issue.
                type: string
              branch:
                description: Branch is the branch prepared for this issue's agent
                  workflow.
                type: string
              conditions:
                description: Conditions represent the current state of the Issue resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastError:
                description: LastError is the latest reconciliation/runtime error
                  for this issue.
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent .metadata.generation
                  observed by the controller.
                format: int64
                type: integer
              phase:
                description: Phase describes where this issue is in the execution
                  pipeline.
                type: string
              prUrl:
                description: PRURL is the URL of the pull request opened for this
                  issue.
                type: string
              prepJobName:
                description: PrepJobName is the Job that clones the repository and
                  creates the branch.
                type: string
              prepRetries:
                description: |-
                  PrepRetries is how many times workspace preparation has been retried.
                  Max retries are controller-defined.
                format: int32
                type: integer
              publishJobName:
                description: PublishJobName is the Job that publishes agent output
                  to GitHub.
                type: string
              workspacePVC:
                description: WorkspacePVC is the name of the PVC holding the per-issue
                  workspace.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
